name: Track Topics

on:
  push:
    branches: [ '*' ]        # runs on pushes to all branches
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run this workflow on'
        required: false
        default: 'main'

jobs:
  track_topics:
    name: Track Topics Job
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # 2. Set up Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Cache Python dependencies
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      # 5. Run the topic tracking script
      - name: Run topic tracking
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_SESSION_STRING: ${{ secrets.BLUESKY_SESSION_STRING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          PYTHONPATH="$PWD" python backend/services/track_topics.py