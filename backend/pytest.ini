# pytest config for backend tests.
# CI default: pytest -m unit (mock only, no secrets).
# Remote: pytest -m integration (real remote; set BLUESKY_* / MASTODON_* in env).
[pytest]
testpaths = tests
pythonpath = .
markers =
    unit: fast tests, no external calls; API and routes are mocked.
    integration: hits real remote APIs; requires credentials; skipped when not set.
